name: Oracle ARM Auto Provision

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-macro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - run: composer install --no-dev --no-interaction

      - name: Create Private Key
        run: |
          printf '%s\n' '${{ secrets.OCI_PRIVATE_KEY }}' > ./oci_api_key.pem
          chmod 600 ./oci_api_key.pem

      - name: Create .env
        run: |
          sed 's/^[[:space:]]*//' << 'ENVBLOCK' > .env.tmp
          OCI_REGION="${{ secrets.OCI_REGION }}"
          OCI_TENANCY_ID="${{ secrets.OCI_TENANCY_ID }}"
          OCI_USER_ID="${{ secrets.OCI_USER_ID }}"
          OCI_KEY_FINGERPRINT="${{ secrets.OCI_KEY_FINGERPRINT }}"
          OCI_PRIVATE_KEY_FILENAME="./oci_api_key.pem"
          OCI_SUBNET_ID="${{ secrets.OCI_SUBNET_ID }}"
          OCI_IMAGE_ID="${{ secrets.OCI_IMAGE_ID }}"
          OCI_COMPARTMENT_ID="${{ secrets.OCI_COMPARTMENT_ID }}"
          OCI_SHAPE="VM.Standard.A1.Flex"
          OCI_OCPU="4"
          OCI_MEMORY_IN_GBS="24"
          OCI_SSH_PUBLIC_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          ENVBLOCK
          sed '/^[[:space:]]*$/d; s/[[:space:]]*$//' .env.tmp > .env
          rm -f .env.tmp

      - name: Debug - verify .env
        run: |
          echo "=== .env content ==="
          cat -A .env
          echo "=== line count ==="
          wc -l .env

      - name: Run Oracle Macro
        run: php index.php
```

이 방식이 이전 `echo` 방식과 다른 점 세 가지입니다:

1. **`sed 's/^[[:space:]]*//'`로 heredoc을 파이프** — YAML 들여쓰기로 들어간 앞쪽 공백을 heredoc 출력 시점에서 즉시 제거합니다.

2. **모든 값을 `"따옴표"`로 감쌈** — SSH 공개키처럼 내부에 공백이 있는 값도 dotenv 파서가 정상적으로 읽습니다. phpdotenv은 `KEY="value with spaces"` 형식을 공식 지원합니다.

3. **두 번째 sed로 빈 줄과 줄 끝 공백을 제거** — Secrets 값 끝에 붙은 보이지 않는 공백이나, heredoc 사이에 끼어든 빈 줄을 깨끗이 정리합니다.

---

## GitHub Secrets 공백 제거 — 직접 확인 방법

현재 등록된 모든 Secret을 아래 절차로 재등록하는 것을 강력 권장합니다:

**각 Secret마다 이렇게 하세요:**

1. GitHub → Settings → Secrets → Actions에서 해당 Secret의 **Update** 클릭
2. 값 입력란에서 **Ctrl+A**로 전체 선택
3. 메모장에 붙여넣기
4. 메모장에서 **앞뒤 빈 줄, 앞뒤 공백**이 있는지 확인하고 삭제
5. 깨끗한 값만 다시 복사해서 Secret에 붙여넣고 저장

**특히 주의할 Secret:**

| Secret 이름 | 흔한 실수 |
|---|---|
| `OCI_SSH_PUBLIC_KEY` | 끝에 줄바꿈이 들어감 |
| `OCI_KEY_FINGERPRINT` | 앞뒤에 공백이 들어감 |
| `OCI_PRIVATE_KEY` | `-----BEGIN`앞에 빈 줄, `-----END` 뒤에 빈 줄 |
| 모든 OCID 값들 | 더블클릭 선택 시 앞뒤 공백이 따라 붙음 |

**OCI_PRIVATE_KEY 재등록 시 주의:**

값이 정확히 아래 형태로 시작하고 끝나야 합니다. 앞뒤에 빈 줄이 **없어야** 합니다:
```
-----BEGIN RSA PRIVATE KEY-----
MIIEow...
...
-----END RSA PRIVATE KEY-----
```

---

## 디버그 로그 읽는 법

수정 적용 후 Actions 실행 시 **"Debug - verify .env"** 단계의 로그를 확인하세요. `cat -A`는 숨겨진 문자를 모두 보여줍니다:
```
# 정상인 경우 ($ 기호는 줄바꿈을 의미, 문제 없음)
OCI_REGION="ap-chuncheon-1"$
OCI_SHAPE="VM.Standard.A1.Flex"$

# 비정상인 경우 (공백이 남아있음)
OCI_REGION="ap-chuncheon-1"  $    ← 줄 끝 공백
^I OCI_SHAPE="VM.Standard.A1.Flex"$  ← 줄 앞 탭/공백
