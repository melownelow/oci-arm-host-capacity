name: Oracle ARM Auto Provision

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-macro:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Dependencies
        run: composer install --no-dev --no-interaction

      - name: Create .env and Private Key
        run: |
          cat << 'KEYEOF' > ./oci_api_key.pem
          ${{ secrets.OCI_PRIVATE_KEY }}
          KEYEOF
          chmod 600 ./oci_api_key.pem

          cat << ENVEOF > .env
          OCI_REGION=${{ secrets.OCI_REGION }}
          OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}
          OCI_USER_ID=${{ secrets.OCI_USER_ID }}
          OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME=./oci_api_key.pem
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
          OCI_COMPARTMENT_ID=${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_SHAPE=VM.Standard.A1.Flex
          OCI_OCPU=4
          OCI_MEMORY_IN_GBS=24
          OCI_SSH_PUBLIC_KEY=${{ secrets.OCI_SSH_PUBLIC_KEY }}
          ENVEOF

      - name: Run Oracle Macro
        run: php index.php
